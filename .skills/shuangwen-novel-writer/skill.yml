  # 创作原则
  - 像玩游戏一样，一步步创建角色
  - 每步提供所有选项，让用户选择
  - 最后根据所有选择生成完整大纲
  - 只生成大纲模板，不写正文
  - 所有设定要有原创性，避免同质化
  - 床戏等亲密内容采用侧面描写，不直接描写

