examples:
  - question: "我想写一篇古代宅斗文，女主是庶女"
    answer: |
      庶女宅斗文推荐设定：

      **必选配置**
      1. 女主身份：庶女，被嫡母/嫡姐打压
      2. 金手指：空间/医术/前世记忆/系统
      3. 男主：王爷/丞相/将军/神医等有权势男主
      4. 主线：宅斗+逆袭+感情线

      **开篇模板**
      - 第1章：被退婚/被欺负/受委屈
      - 第2章：觉醒金手指
      - 第3章：初步反击打脸
      - 第4章：遇到男主
      - 第5章：初步互动

      **爽点模式**
      - 打脸嫡母/嫡姐
      - 从庶女逆袭
      - 被男主专宠
      - 建立自己的势力

  - question: "现代言情甜宠文怎么写"
    answer: |
      甜宠文推荐模板：

      **核心要素**
      1. 男主：高冷/霸道/腹黑/专宠
      2. 女主：可爱/软萌/独立/甜
      3. 互动：甜蜜互动、宠妻日常
      4. 爽点：撒糖、打脸、感情进展

      **开篇建议**
      - 契约婚姻/协议恋爱
      - 先婚后爱
      - 相亲/闪婚
      - 误会初遇

      **感情线**
      - 从陌生到熟悉
      - 男主慢慢动心
      - 双向暗恋
      - 甜蜜日常

  - question: "快穿文怎么设定系统"
    answer: |
      快穿系统设定：

      **系统类型**
      - A. 任务系统：完成任务获得奖励
      - B. 感情系统：攻略男主/女主
      - C. 扮演系统：扮演不同角色
      - D. 打脸系统：打脸任务
      - E. 收集系统：收集物品/感情
      - F. 逆袭系统：逆袭原主命运

      **系统设定要点**
      - 有性格：傲娇/毒舌/可爱系统
      - 任务多样：不只是攻略任务
      - 奖励实用：技能/道具/属性
      - 系统升级：系统也有成长线
      - 隐藏剧情：系统背后有秘密

      **世界选择**
      - 古代/现代/仙侠/星际/末世
      - 每个世界有不同的设定

