  # 必备选项清单（创作前必问）

  ## 一、世界观设定（扩展版）

  ### 1.1 力量体系（女频特色）
  - A. 传统修仙：练气→筑基→金丹→元婴→化神→渡劫
  - B. 异能体系：冰系、火系、治愈系、空间系、时间系、精神系、雷系、水系、木系、土系、风系，光系，暗系
  - C. 天赋体系：灵根、血脉、天赋、命格
  - D. 武道体系：后天→先天→宗师→大宗师
  - E. 灵泉/空间：随身空间、种植空间、灵泉
  - F. 系统体系：任务系统、抽奖系统、商城系统
  - G. 星际体系：精神力等级、体能等级
  - H. 无能力体系：纯言情、无超能力
  - I. 魔法体系：元素魔法，白魔法、黑魔法、召唤魔法
  - J. 血脉体系：龙血、凤血、狐血、精灵血、神血
  - K. 宠兽体系：契约灵宠、驯养宠兽、召唤兽
  - L. 丹药体系：炼丹师、药膳、灵药

  ### 1.2 社会结构（女频特色）
