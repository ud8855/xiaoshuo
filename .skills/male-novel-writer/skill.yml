  - L. 政府机构：科员→科长→处长→局长→部长→总理→主席
  - M. 军队系统：士兵→班长→排长→连长→营长→团长→旅长→师长→军长→司令
  - N. 地下势力：成员→小头目→大头目→堂主→副帮主→帮主→太上帮主
  - O. 国际组织：普通成员→正式成员→核心成员→理事→常务理事→主席
  - P. 科研机构：研究员→副研究员→研究员→教授→首席科学家→院长
  - Q. 医院系统：实习→住院→主治→副主任→主任→副院长→院长
  - R. 学校系统：学生→助教→讲师→副教授→教授→副校长→校长
  - S. 娱乐公司：练习生→艺人→一线艺人→顶流→股东→老板
  - T. 异能组织：普通成员→精英→队长→统领→副首领→首领→太上首领

  ### 1.3 地理环境（24种）
  **都市类**（8种）：
  - A. 真实都市：北上广深、杭州、成都、武汉、西安
  - B. 虚构都市：自定义城市、背景类似现实
