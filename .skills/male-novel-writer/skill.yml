  - B. 简化修仙：炼体→炼气→宗师→大宗师→天人→陆地神仙→神仙
  - C. 血脉修仙：觉醒→进化→蜕变→返祖→神化
  - D. 武道修仙：后天→先天→宗师→大宗师→武圣→武神
  - E. 剑修体系：剑童→剑士→剑师→大剑师→剑王→剑皇→剑尊→剑圣→剑神
  - F. 丹道体系：丹徒→丹士→丹师→大丹师→丹王→丹皇→丹尊→丹圣→丹神
  - G. 符道体系：符徒→符士→符师→大符师→符王→符皇→符尊→符圣→符神
  - H. 阵道体系：阵徒→阵士→阵师→大阵师→阵王→阵皇→阵尊→阵圣→阵神
  - I. 器道体系：器徒→器士→器师→大器师→器王→器皇→器尊→器圣→器神
  - J. 亡灵体系：亡灵学徒→亡灵法师→大亡灵法师→亡灵宗师→亡灵帝王→冥神
  - K. 召唤体系：召唤师→大召唤师→召唤宗师→召唤帝王→召唤神
  - L. 巫术体系：巫徒→巫师→大巫师→巫王→巫皇→巫神

  **异能体系**（8种）：
  - M. 传统异能：F级→E级→D级→C级→B级→A级→S级→SS级→SSS级
