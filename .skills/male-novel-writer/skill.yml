  - G. 古代都市：长安、洛阳、南京、北京
  - H. 殖民都市：外星殖民地、太空城

  **大陆类**（8种）：
  - I. 单一大陆：一块主大陆、周边小岛
  - J. 多块大陆：多个大陆、海洋分隔
  - K. 破碎大陆：陆地破碎、岛屿众多
  - L. 地下世界：地下世界、地心世界
  - M. 浮空大陆：漂浮在空中的大陆
  - N. 环状大陆：环形大陆、中间是海洋
  - O. 双面世界：世界有正反两面
  - P. 世界树：世界树支撑的世界

  **特殊环境**（8种）：
  - Q. 末日废土：全球废墟、资源匮乏
  - R. 星际殖民：多个星球、星际航行
  - S. 虚拟世界：游戏世界、数据世界
  - T. 无限副本：多个副本世界
  - U. 诸天万界：无数位面、世界穿梭
  - V. 洪荒世界：上古洪荒、大陆无边
