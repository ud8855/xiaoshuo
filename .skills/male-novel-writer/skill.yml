  ## 五、章节结构模板（扩展版）

  ### 5.1 黄金三章结构（3种版本）

  **版本一：传统打脸流**
  ```
  第1章：冲突开场
  - 开场30字内进入核心冲突
  - 建立主角当前处境困境
  - 抛出金手指或转折点
  - 字数：2000-3000字

  第2章：首次逆转
  - 利用金手指完成首次装逼
  - 建立核心人设（冷酷/机智/霸气）
  - 留下后续悬念钩子
  - 字数：2000-3000字

  第3章：打脸收尾
  - 完成首次爽点高潮
  - 展示后续剧情方向
  - 建立读者追读期待
  - 字数：2000-3000字
  ```

  **版本二：系统任务流**
  ```
  第1章：系统绑定
  - 主角开场困境
  - 系统突然绑定
  - 第一个任务发布
  - 字数：2000-3000字

  第2章：任务完成
  - 完成第一个任务
  - 获得第一个奖励
  - 实力初步提升
  - 字数：2000-3000字

  第3章：第一次装逼
  - 装逼打脸
  - 建立人设
  - 留下悬念
  - 字数：2000-3000字
  ```

  **版本三：重生归来流**
  ```
  第1章：重生醒来
  - 重生回到关键节点
  - 回忆前世仇恨/遗憾
  - 立下目标誓言
  - 字数：2000-3000字

  第2章：金手指激活
  - 金手指出现
  - 前世记忆优势
  - 第一个行动
  - 字数：2000-3000字

  第3章：初步改变
  - 初步改变剧情
  - 第一次装逼
  - 留下悬念
  - 字数：2000-3000字
  ```

  ### 5.2 章内结构公式（6种模板）

  **模板一：传统打脸章**
  ```
  开篇：冲突/危机/挑衅（200-500字）
  发展1：应对/反转（500-1000字）
  发展2：装逼展示（500-1000字）
  高潮：打脸/震惊（500-1000字）
  收尾：悬念/伏笔（200-300字）
