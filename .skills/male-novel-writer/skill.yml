  - H. 教派体系：信徒→教士→主教→大主教→教皇→神使
  - I. 商会组织：伙计→掌柜→执事→长老→会长→太上会长
  - J. 雇佣兵团：普通佣兵→队长→大队长→团长→副团长→团长

  **现代型**（10种）：
